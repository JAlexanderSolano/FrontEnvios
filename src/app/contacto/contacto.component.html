<div class="card">

<h2>Contáctanos</h2>

<form (ngSubmit)="enviarFormulario()" #formulario="ngForm">
  <div>
    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" [(ngModel)]="formData.nombre" required />
  </div>

  <div>
    <label for="correo">Correo:</label>
    <input type="email" id="correo" name="correo" [(ngModel)]="formData.correo" required />
  </div>

  <div>
    <label for="asunto">Asunto:</label>
    <textarea id="asunto" name="asunto" [(ngModel)]="formData.asunto" required></textarea>
  </div>

  <button type="submit" [disabled]="!formulario.form.valid">Enviar</button>
</form>

</div>
