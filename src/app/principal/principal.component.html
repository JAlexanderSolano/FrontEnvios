<div class="container-fluid">
  <div class="row g-3">
    <div class="col-12 col-md-4 col-lg-3 izquierda">
      <div class="card">
        <div class="card-body izquierda">
          <div class="d-flex izquierda">
            <div
              ngbNav
              #nav="ngbNav"
              [(activeId)]="active"
              class="nav nav-underline flex-column"
              orientation="vertical"
            >
              <li ngbDropdown class="nav-item" role="presentation">
                <a class="nav-link estilonav" ngbDropdownToggle>Tarifas</a>
                <div ngbDropdownMenu></div>
              </li>
              <div class="dropdown-divider"></div>
              <li ngbDropdown class="nav-item" role="presentation">
                <a class="nav-link estilonav" ngbDropdownToggle>Directorio</a>
                <div ngbDropdownMenu>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="consultarClientes()"
                  >
                    Clientes
                  </button>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="gestionarDestinatario()"
                  >
                    Destinatario
                  </button>
                </div>
              </li>
              <div class="dropdown-divider"></div>
              <li ngbDropdown class="nav-item" role="presentation">
                <a class="nav-link estilonav" ngbDropdownToggle>Guias</a>
                <div ngbDropdownMenu>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="solicitarGuia()"
                  >
                    Solicitar guia individual
                  </button>
                  <div class="dropdown-divider"></div>
                  <button ngbDropdownItem class="accionPush">
                    Solicitar guia masiva
                  </button>
                  <div class="dropdown-divider"></div>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="listaGuias()"
                  >
                    Lista de guias
                  </button>
                  <div class="dropdown-divider"></div>
                  <button ngbDropdownItem class="accionPush">API</button>
                  <div class="dropdown-divider"></div>
                  <button ngbDropdownItem class="accionPush">Test</button>
                </div>
              </li>
              <div class="dropdown-divider"></div>
              <li ngbDropdown class="nav-item" role="presentation">
                <a class="nav-link estilonav" ngbDropdownToggle
                  >Relación de despacho</a
                >
                <div ngbDropdownMenu>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="generarManifiesto()"
                  >
                    Manifiesto
                  </button>
                  <div class="dropdown-divider"></div>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="generarManifiesto()"
                  >
                    Anular Manifiesto
                  </button>
                  <div class="dropdown-divider"></div>
                  <button
                    ngbDropdownItem
                    class="accionPush"
                    (click)="listaManifiesto()"
                  >
                    Consultar Manifiesto
                  </button>
                </div>
              </li>
              <div class="dropdown-divider"></div>
              <button
                class="btn btn-light text-danger"
                (click)="cerrarSesion()"
              >
                Salir
              </button>
            </div>

            <div [ngbNavOutlet]="nav" class="ms-4"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="col-12 col-md-8 col-lg-9 derecha">
      <div class="card">
        <div class="card-body derecha">
          <iframe
            src=""
            frameborder="0"
            [src]="urlFrame"
            style="width: 100%; height: calc(100vh - 55px); display: block"
          >
          </iframe>
        </div>
      </div>
    </div>
  </div>
</div>
