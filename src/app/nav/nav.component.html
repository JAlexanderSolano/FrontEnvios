<ul
  ngbNav
  #nav="ngbNav"
  [activeId]="1"
  class="nav justify-content-center bg-secondary"
>
  <li [ngbNavItem]="1">
    <a ngbNavLink>
      <button class="btn text-bg-secondary">INICIO</button>
    </a>
    <ng-template ngbNavContent>
      <p>iframe de inicio</p>
    </ng-template>
  </li>
  <li [ngbNavItem]="2">
    <a ngbNavLink>
      <button class="btn text-bg-secondary">NOSOTROS</button>
    </a>

    <ng-template ngbNavContent>
      <p>iframe de nosotros</p>
    </ng-template>
  </li>
  <li [ngbNavItem]="3">
    <a ngbNavLink>
      <button class="btn text-bg-secondary">SERVICIOS</button>
    </a>
    <ng-template ngbNavContent>
      <p>iframe de servicios</p>
    </ng-template>
  </li>
  <li [ngbNavItem]="4">
    <a ngbNavLink>
      <button class="btn text-bg-secondary">TARIFAS</button>
    </a>
    <ng-template ngbNavContent>
      <p>iframe de Tarifas</p>
    </ng-template>
  </li>
  <li [ngbNavItem]="5">
    <a ngbNavLink>
      <button class="btn text-bg-secondary">COTIZADOR</button>
    </a>
    <ng-template ngbNavContent>
      <p>iframe de cotizador</p>
    </ng-template>
  </li>
  <li [ngbNavItem]="6">
      <a ngbNavLink>
        <button class="btn text-bg-secondary"  (click)="IFrameContacto()">
          CONTACTO
        </button>
    </a>
    <ng-template ngbNavContent>
          <iframe
            [src]="urlFrame"
            frameborder="0"
            width="100%"
            style="height: 99vh"
          ></iframe>
        </ng-template>

  </li>
  <li [ngbNavItem]="7">
    <a ngbNavLink>
      <button class="btn btn-light text-danger" (click)="IFrameLogin()">
        Zona Clientes
      </button>
    </a>
    <ng-template ngbNavContent>
      <iframe
        [src]="urlFrame"
        frameborder="0"
        width="100%"
        style="height: 99vh"
      ></iframe>
    </ng-template>
  </li>
</ul>
<div [ngbNavOutlet]="nav" class="mt-2"></div>
