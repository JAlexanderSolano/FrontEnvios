<div class="card mb-4">
  <div class="card-header bg-primary text-white">
    Listado de guías con manifiesto
  </div>
  <div class="card-body">
    <div class="mb-4">
      <input
        type="text"
        class="form-control"
        placeholder="Buscar cliente o cuenta..."
        [(ngModel)]="filtroManifiesto"
        (ngModelChange)="filtrarManifiesto()"
      />
    </div>
    <div class="mb-4 table-responsive">
      <!-- Tabla de guias  -->
      <table
        class="table table-striped table-hover table-bordered align-middle"
      >
        <thead class="rounded-header">
          <tr>
            <th scope="col" hidden="true">Id</th>
            <th scope="col">Cuenta</th>
            <th scope="col">Cliente</th>
            <th scope="col">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let guia of listaManifiesto">
            <td hidden="true">{{ guia.id_manifiesto }}</td>
            <td>{{ guia.cuenta }}</td>
            <td>{{ guia.nombreCliente }}</td>
            <td>
              <button
                class="btn btn-sm btn-danger"
                (click)="verDetalleGuia(guia.guias)"
              >
                <i class="bi bi-trash"></i> Ver Detalle
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- Modal de confirmación -->
    <div
      class="modal fade"
      id="detalleModal"
      tabindex="-1"
      aria-labelledby="confirmModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-danger text-white">
            <h5 class="modal-title" id="confirmModalLabel">Ver Detalle</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Cerrar"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="idGuia" class="form-label">Guia</label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="dataGuia.id_Guia"
                readonly
              />
            </div>
            <div class="mb-3">
              <label for="destinatario" class="form-label">Destinatario</label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="dataGuia.destinatario"
                readonly
              />
            </div>
            <div class="mb-3">
              <label for="ciudad" class="form-label">Ciudad</label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="dataGuia.ciudadDestino"
                readonly
              />
            </div>
            <div class="mb-3">
              <label for="fechaInclusion" class="form-label"
                >Fecha Inclusión</label
              >
              <input
                type="text"
                class="form-control"
                [(ngModel)]="dataGuia.fechaInclusion"
                readonly
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-danger"
              data-bs-dismiss="modal"
            >
              Cerrar Detalle
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
